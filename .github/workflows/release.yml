name: release

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - ".github/**/*.*"
      - "**/*.md"
      - "**/*.txt"

env:
  DOTNET_ROLL_FORWARD: Major
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: 1
  # https://stackoverflow.com/questions/75180149/how-to-cache-dotnet-installation-in-github-actions
  # access to "usr/lib/dotnet" is denied
  DOTNET_INSTALL_DIR: /usr/share/dotnet
  DOTNET_ROOT: /usr/share/dotnet

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
  build:
    name: Build
    # required for proper WPF builds/publishes
    runs-on: windows-latest
    needs: ci
    permissions:
      contents: write # publish a GitHub Release
      id-token: write # Trusted Publishing (tokenless NuGet pushes)
      issues: write # comment on released issues
      packages: write # push packages to "HaloSPV3" GitHub Nuget Package Registry
      pull-requests: write # comment on released pull requests

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required by GitVersion, Semantic Release
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6.2.0
        with:
          cache: npm
          node-version: ">=24.0.0"
          node-version-file: package.json
          check-latest: true
      - run: npm i -g npm@latest
      - run: npm ci
      - run: npm audit signatures

      - name: Setup Dotnet
        uses: actions/setup-dotnet@v5.1.0
        with:
          cache: dotnet

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: nToss

      - name: Semantic Release
        id: semantic-release
        run: npx semantic-release -- --debug
        env:
          DEBUG: semantic-release*
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_TOKEN: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
