name: CodeQL Analysis

on:
  push:
  pull_request:
    types: [opened, reopened, ready_for_review]
  schedule:
  - cron: '0 0 * * *'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['csharp', 'javascript']

    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - id: isDepUpBranch
      name: Is the current branch a dep-upgrade branch?
      shell: bash
      run: |
        BRANCH_NAME="$(git branch --show-current)"
        echo "BRANCH_NAME is '$BRANCH_NAME'"
        [[ "$BRANCH_NAME" =~ ^(renovate|dependabot)/.+$ ]] &&
          echo $'V=true\nIMMUTABLE_CACHE=--immutable-cache' > $GITHUB_OUTPUT ||
          echo 'This branch is not a dep-upgrade branch.'

    - run: corepack enable
    - name: Setup Node
      uses: actions/setup-node@v7
      with:
        # cache: yarn
        node-version-file: .nvmrc

    - run: corepack enable

    - run: yarn install --immutable # ${{ steps.isDepUpBranch.outputs.IMMUTABLE_CACHE}}

    - uses: actions/setup-dotnet@v5
      with:
        cache: true
        cache-dependency-path: |
          src/packages.lock.json
          src/packages-debug.lock.json

    - name: Setup DotNet
      uses: actions/setup-dotnet@v5

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        config-file: 'lgtm.yml'
        languages: ${{ matrix.language }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
